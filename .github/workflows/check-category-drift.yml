# pluginCategories.json is the single source of truth for categories. The Issue Form
# dropdown (.github/ISSUE_TEMPLATE/plugin-submission.yml) keeps a hand copy, since
# static YAML Issue Forms can't fetch anything at render time - nothing keeps that copy
# honest. Add a category upstream and the form silently offers a stale list forever,
# with no error anywhere. This check is what stops that.
#
# The guided page (docs/submit_new_plugin/) used to keep its own copy too, but no
# longer touches categories at all: GitHub Issue Forms cannot prefill a dropdown field
# via query parameters under any circumstances, so there was nothing useful for that
# page to carry - the submitter now picks Category directly on the real GitHub form.
#
# WHY push AND a daily schedule, not just pull_request: a real "Home Automation &
# Integrations" -> "Automation & Integrations" rename landed straight on master
# without ever going through a PR that touched one of the paths below, so the
# pull_request trigger never ran and the drift sat live, undetected, until someone
# happened to run the script by hand. `push` catches the same class of change the
# moment it lands on master instead of waiting for a PR; the daily schedule is a
# backstop that doesn't depend on paths-matching at all (e.g. a change made through
# the GitHub web UI, or a future file this list doesn't yet know about).

name: ZZ - Automation - Check category drift

on:
  pull_request:
    paths:
      - "pluginCategories.json"
      - ".github/ISSUE_TEMPLATE/plugin-submission.yml"
      - ".github/ISSUE_TEMPLATE/change_plugin_category.yml"
      - ".github/scripts/check_category_drift.py"
      - ".github/workflows/check-category-drift.yml"
  push:
    branches: [master]
    paths:
      - "pluginCategories.json"
      - ".github/ISSUE_TEMPLATE/plugin-submission.yml"
      - ".github/ISSUE_TEMPLATE/change_plugin_category.yml"
      - ".github/scripts/check_category_drift.py"
      - ".github/workflows/check-category-drift.yml"
  schedule:
    - cron: "43 6 * * *"  # once daily; arbitrary time, offset from the hour
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install --quiet pyyaml

      - name: Compare category copies against pluginCategories.json
        run: |
          python .github/scripts/check_category_drift.py \
            --categories pluginCategories.json \
            --form .github/ISSUE_TEMPLATE/plugin-submission.yml \
            --form .github/ISSUE_TEMPLATE/change_plugin_category.yml
